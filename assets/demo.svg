<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Looping terminal replay of node demo.js: meter, evaluate, gate, projected saving — with agent-stable title card between loops">
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 17px; }
    /* 18s cycle: 0-2.5s title card · 3-10s lines type in · hold · 16.5-17.2s fade · card returns */
    .ln  { opacity: 0; animation-duration: 18s; animation-timing-function: linear; animation-iteration-count: infinite; }
    .l0  { animation-name: k0 }  .l1  { animation-name: k1 }  .l2  { animation-name: k2 }
    .l3  { animation-name: k3 }  .l4  { animation-name: k4 }  .l5  { animation-name: k5 }
    .l6  { animation-name: k6 }  .l7  { animation-name: k7 }  .l8  { animation-name: k8 }
    .l9  { animation-name: k9 }  .l10 { animation-name: k10 } .l11 { animation-name: k11 }
    @keyframes k0  { 0%, 17.8% { opacity: 0 } 19.8%, 100% { opacity: 1 } }
    @keyframes k1  { 0%, 21.7% { opacity: 0 } 23.7%, 100% { opacity: 1 } }
    @keyframes k2  { 0%, 25.0% { opacity: 0 } 27.0%, 100% { opacity: 1 } }
    @keyframes k3  { 0%, 28.9% { opacity: 0 } 30.9%, 100% { opacity: 1 } }
    @keyframes k4  { 0%, 32.2% { opacity: 0 } 34.2%, 100% { opacity: 1 } }
    @keyframes k5  { 0%, 33.3% { opacity: 0 } 35.3%, 100% { opacity: 1 } }
    @keyframes k6  { 0%, 37.2% { opacity: 0 } 39.2%, 100% { opacity: 1 } }
    @keyframes k7  { 0%, 40.6% { opacity: 0 } 42.6%, 100% { opacity: 1 } }
    @keyframes k8  { 0%, 43.3% { opacity: 0 } 45.3%, 100% { opacity: 1 } }
    @keyframes k9  { 0%, 47.2% { opacity: 0 } 49.2%, 100% { opacity: 1 } }
    @keyframes k10 { 0%, 52.2% { opacity: 0 } 54.2%, 100% { opacity: 1 } }
    @keyframes k11 { 0%, 54.4% { opacity: 0 } 56.4%, 100% { opacity: 1 } }
    .screen { animation: scr 18s linear infinite; }
    @keyframes scr { 0%, 91.7% { opacity: 1 } 95.6%, 100% { opacity: 0 } }
    .curwin { opacity: 0; animation: cw 18s linear infinite; }
    @keyframes cw { 0%, 56.7% { opacity: 0 } 58.7%, 100% { opacity: 1 } }
    .blink { animation: bl 1.1s steps(1) infinite; }
    @keyframes bl { 50% { opacity: 0 } }
    .card { animation: crd 18s linear infinite; }
    @keyframes crd { 0%, 13.9% { opacity: 1 } 16.9%, 95% { opacity: 0 } 98.9%, 100% { opacity: 1 } }
    .t { fill: #dbe4ee } .m { fill: #8fa1b3 } .b { fill: #7fb0ff }
    .g { fill: #6fcf97 } .y { fill: #e8c07a } .r { fill: #f1948a } .p { fill: #6fcf97 }
  </style>
  <defs>
    <linearGradient id="shoe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8c07a"/>
      <stop offset="1" stop-color="#b8863d"/>
    </linearGradient>
  </defs>

  <!-- terminal chrome -->
  <rect x="1" y="1" width="1198" height="518" rx="14" fill="#0d1117" stroke="#2c3646" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="44" rx="14" fill="#161d27"/>
  <rect x="1" y="31" width="1198" height="15" fill="#161d27"/>
  <circle cx="28" cy="23" r="7" fill="#ff5f56"/>
  <circle cx="52" cy="23" r="7" fill="#ffbd2e"/>
  <circle cx="76" cy="23" r="7" fill="#27c93f"/>
  <text x="600" y="29" text-anchor="middle" class="m" font-size="14px">agent-stable — node demo.js (no network)</text>

  <!-- replay -->
  <g class="screen">
    <text x="40" y="86" class="ln l0"><tspan class="p">$</tspan><tspan class="t"> node demo.js</tspan></text>

    <text x="40" y="124" class="ln l1"><tspan class="b">1) meter a few calls…</tspan></text>
    <text x="40" y="152" class="ln l2"><tspan class="t">   3 events metered — </tspan><tspan class="y">$0.001260</tspan><tspan class="t"> (funding class: </tspan><tspan class="r">real</tspan><tspan class="t">)</tspan></text>

    <text x="40" y="190" class="ln l3"><tspan class="b">2) a challenger appears — head-to-head eval, judged…</tspan></text>
    <text x="40" y="218" class="ln l4"><tspan class="t">   verdict: {"qualityOK":</tspan><tspan class="g">true</tspan><tspan class="t">,"cheaper":</tspan><tspan class="g">true</tspan><tspan class="t">,"note":"A leads with the thesis and</tspan></text>
    <text x="40" y="246" class="ln l5"><tspan class="t">   contextualizes every figure","cp":{"in":</tspan><tspan class="y">0.5</tspan><tspan class="t">,"out":</tspan><tspan class="y">2</tspan><tspan class="t">},"ip":{"in":</tspan><tspan class="y">3</tspan><tspan class="t">,"out":</tspan><tspan class="y">15</tspan><tspan class="t">}}</tspan></text>

    <text x="40" y="284" class="ln l6"><tspan class="b">3) the adopt gate…</tspan></text>
    <text x="40" y="312" class="ln l7"><tspan class="t">   autoAdopt on : {"adopt":</tspan><tspan class="g">true</tspan><tspan class="t">,"reason":"equal-or-better and cheaper"}</tspan></text>
    <text x="40" y="340" class="ln l8"><tspan class="t">   autoAdopt off: {"adopt":</tspan><tspan class="r">false</tspan><tspan class="t">,"reason":"better+cheaper (auto-adopt off)"}</tspan></text>

    <text x="40" y="378" class="ln l9"><tspan class="b">4) projected saving</tspan><tspan class="t"> at ~40M in / 8M out per month: </tspan><tspan class="y">$204/mo</tspan></text>

    <text x="40" y="430" class="ln l10"><tspan class="m">That is the loop: </tspan><tspan class="t">meter → evaluate → gate → (host commits, reversibly).</tspan></text>

    <text x="40" y="472" class="ln l11"><tspan class="p">$</tspan></text>
    <g class="curwin"><rect x="62" y="458" width="10" height="19" fill="#dbe4ee" class="blink"/></g>
  </g>

  <!-- title card between loops -->
  <g class="card">
    <rect x="2" y="46" width="1196" height="471" fill="#0d1117"/>
    <g transform="translate(450,64)">
      <path d="M 199.8 110.2 A 65 65 0 1 1 100.2 110.2"
            fill="none" stroke="url(#shoe)" stroke-width="24" stroke-linecap="round"/>
      <circle cx="199.8" cy="110.2" r="4.5" fill="#0d1117"/>
      <circle cx="215"   cy="152"   r="4.5" fill="#0d1117"/>
      <circle cx="196"   cy="198"   r="4.5" fill="#0d1117"/>
      <circle cx="150"   cy="217"   r="4.5" fill="#0d1117"/>
      <circle cx="104"   cy="198"   r="4.5" fill="#0d1117"/>
      <circle cx="85"    cy="152"   r="4.5" fill="#0d1117"/>
      <circle cx="100.2" cy="110.2" r="4.5" fill="#0d1117"/>
    </g>
    <text x="600" y="382" text-anchor="middle" font-size="42px" font-weight="700" fill="#e6edf3">agent<tspan fill="#d4a24e">-</tspan>stable</text>
    <text x="600" y="422" text-anchor="middle" class="m">node demo.js — meter → evaluate → gate, no network</text>
  </g>
</svg>
